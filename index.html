<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#020617,#1e3a8a);
    color:#fff;
}

/* ===== HUD XP FIXO ===== */
#hudXP{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#020617;
    border-bottom:2px solid #2563eb;
    text-align:center;
    padding:10px;
    font-weight:bold;
    z-index:999;
}

/* CONTAINER */
.container{
    width:95%;
    max-width:900px;
    margin:80px auto 20px auto;
    background:#020617;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 30px #000;
}

h1,h2,h3{text-align:center}

button{
    width:100%;
    padding:15px;
    margin:6px 0;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

button:hover{background:#1d4ed8}
/* BOTÃO VOLTAR */
#btnVoltarTopo{
    position:fixed;
    top:60px;
    left:10px;
    width:auto;
    padding:10px 18px;
    border-radius:15px;
    background:#1e40af;
    border:2px solid #60a5fa;
    box-shadow:0 0 10px #000;
    font-size:16px;
    display:none;
    z-index:1000;
}

#btnVoltarTopo:hover{
    background:#2563eb;
    transform:scale(1.05);
}

.option{
    display:flex;
    align-items:center;
    background:#0f172a;
    border:2px solid #2563eb;
    padding:12px;
    border-radius:12px;
    margin:10px 0;
}

.letra{
    background:#2563eb;
    padding:6px 12px;
    margin-right:10px;
    border-radius:8px;
}

.correct{background:#22c55e !important}
.wrong{background:#ef4444 !important}

.hidden{display:none}

#xp{text-align:center;color:#22c55e;font-size:18px}

/* RESPONSIVO */
@media(min-width:700px){
button{font-size:16px}
.option{font-size:18px}
}
</style>
</head>

/* ===== SISTEMA ===== */

let atual="",perguntas=[],i=0,xp=0,nivelAtual="";
let XP_MAX = 1000;
let prova = false;

/* atualizar HUD */
function atualizarHUD(){
document.getElementById("hudXP").innerText = `XP: ${xp} / ${XP_MAX}`;
}

/* juntar todas perguntas */
function todasPerguntas(){
let todas=[];
for(let m in banco){
["Fácil","Médio","Difícil"].forEach(n=>{
if(banco[m][n]){
banco[m][n].forEach(p=>todas.push({...p}));
}
});
}
return todas;
}

/* embaralhar */
function embaralhar(p){
let arr=p.a.map((t,i)=>({t,correta:i===p.c}));
arr.sort(()=>Math.random()-0.5);
p.a=arr.map(o=>o.t);
p.c=arr.findIndex(o=>o.correta);
return p;
}

/* montar */
function montar(){
let div=document.getElementById("materias");
div.innerHTML="";
for(let m in banco){
let b=document.createElement("button");
b.innerText=m;
b.onclick=()=>nivel(m);
div.appendChild(b);
}
}

/* nível */
function nivel(m){
atual=m;
menu.classList.add("hidden");
nivelDiv.classList.remove("hidden");

let div=document.getElementById("niveis");
div.innerHTML="";

["Fácil","Médio","Difícil"].forEach(n=>{
let b=document.createElement("button");
b.innerText=n;
b.onclick=()=>start(n);
div.appendChild(b);
});
document.getElementById("btnVoltarTopo").style.display = "block";
}

/* start */
function start(n){
prova=false;
nivelAtual=n;
perguntas=banco[atual][n].map(p=>embaralhar({...p}));
i=0;

nivelDiv.classList.add("hidden");
quiz.classList.remove("hidden");

mostrar();
}

/* prova */
function iniciarProva(){
prova=true;
perguntas=todasPerguntas().map(p=>embaralhar({...p}));
i=0;
xp=0;

document.getElementById("provaFinal").classList.add("hidden");
quiz.classList.remove("hidden");

mostrar();
}

/* mostrar */
function mostrar(){
if(i>=perguntas.length){fim();return;}

let p=perguntas[i];
pergunta.innerText=p.q;

let ops=document.getElementById("ops");
ops.innerHTML="";

p.a.forEach((txt,idx)=>{
let b=document.createElement("button");
b.className="option";
b.innerHTML=`<span class="letra">${String.fromCharCode(65+idx)}</span>${txt}`;
b.onclick=()=>responder(idx);
ops.appendChild(b);
});

xpTxt.innerText="XP: "+xp;
atualizarHUD();
}

/* responder */
function responder(x){
let opcoes=document.querySelectorAll(".option");

if(x===perguntas[i].c){
ok.play();
opcoes[x].classList.add("correct");
xp+=10;
}else{
no.play();
opcoes[x].classList.add("wrong");
opcoes[perguntas[i].c].classList.add("correct");
}

atualizarHUD();

setTimeout(()=>{
i++;
mostrar();
},600);
}

/* fim */
function fim(){
quiz.classList.add("hidden");

if(xp>=XP_MAX && !prova){
document.getElementById("provaFinal").classList.remove("hidden");
return;
}

final.classList.remove("hidden");
resultado.innerText=prova ? 
"🏆 VOCÊ COMPLETOU A PROVA FINAL!" :
"XP final: "+xp;

if(nivelAtual==="Difícil"){
document.getElementById("btnProx").style.display="none";
}else{
document.getElementById("btnProx").style.display="block";
}

atualizarHUD();
}

/* repetir */
function repetir(){
start(nivelAtual);
final.classList.add("hidden");
}

/* próximo nível */
function proximoNivel(){
if(nivelAtual==="Fácil") start("Médio");
else if(nivelAtual==="Médio") start("Difícil");
final.classList.add("hidden");
}

/* voltar */
function voltar(){
menu.classList.remove("hidden");
nivelDiv.classList.add("hidden");
quiz.classList.add("hidden");
final.classList.add("hidden");

document.getElementById("btnVoltarTopo").style.display = "none";

atualizarHUD();
}

/* atalhos */
const menu=document.getElementById("menu");
const nivelDiv=document.getElementById("nivel");
const quiz=document.getElementById("quiz");
const final=document.getElementById("final");
const pergunta=document.getElementById("pergunta");
const xpTxt=document.getElementById("xp");
const resultado=document.getElementById("resultado");
const ok=document.getElementById("ok");
const no=document.getElementById("no");

/* iniciar */
montar();
atualizarHUD();

</script>
