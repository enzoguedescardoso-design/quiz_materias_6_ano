<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 6º Ano</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Segoe UI';
    background:linear-gradient(135deg,#020617,#1e3a8a);
    color:#fff;
}

/* ===== HUD XP FIXO ===== */
#hudXP{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#020617;
    border-bottom:2px solid #2563eb;
    text-align:center;
    padding:10px;
    font-weight:bold;
    z-index:999;
}

/* CONTAINER */
.container{
    width:95%;
    max-width:900px;
    margin:80px auto 20px auto;
    background:#020617;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 30px #000;
}

h1,h2,h3{text-align:center}

button{
    width:100%;
    padding:15px;
    margin:6px 0;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

button:hover{background:#1d4ed8}

.option{
    display:flex;
    align-items:center;
    background:#0f172a;
    border:2px solid #2563eb;
    padding:12px;
    border-radius:12px;
    margin:10px 0;
}

.letra{
    background:#2563eb;
    padding:6px 12px;
    margin-right:10px;
    border-radius:8px;
}

.correct{background:#22c55e !important}
.wrong{background:#ef4444 !important}

.hidden{display:none}

#xp{text-align:center;color:#22c55e;font-size:18px}

/* RESPONSIVO */
@media(min-width:700px){
button{font-size:16px}
.option{font-size:18px}
}
</style>
</head>

<body>

<!-- HUD XP -->
<div id="hudXP">XP: 0 / 200</div>

<div class="container">

<h1>🎮 QUIZ 6º ANO</h1>

<div id="menu">
<h3>Escolha a matéria</h3>
<div id="materias"></div>
</div>

<div id="nivel" class="hidden">
<h3>Escolha o nível</h3>
<div id="niveis"></div>
</div>

<div id="quiz" class="hidden">
<h2 id="pergunta"></h2>
<div id="ops"></div>
<p id="xp"></p>
</div>

<div id="final" class="hidden">
<h2 id="resultado"></h2>

<button onclick="repetir()">🔁 Repetir</button>
<button id="btnProx" onclick="proximoNivel()">🚀 Próximo nível</button>
<button onclick="voltar()">⬅ Menu</button>
</div>

<div id="provaFinal" class="hidden">
<h2>🔥 PROVA FINAL 🔥</h2>
<p>Agora você desbloqueou o desafio máximo!</p>
<button onclick="iniciarProva()">COMEÇAR</button>
</div>

</div>

<audio id="ok" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="no" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

/* ESPANHOL */
"Espanhol":{

/* ===== SISTEMA ===== */

let atual="",perguntas=[],i=0,xp=0,nivelAtual="";
let XP_MAX = 200;
let prova = false;

/* atualizar HUD */
function atualizarHUD(){
document.getElementById("hudXP").innerText = `XP: ${xp} / ${XP_MAX}`;
}

/* juntar todas perguntas */
function todasPerguntas(){
let todas=[];
for(let m in banco){
["facil","medio","dificil"].forEach(n=>{
if(banco[m][n]){
banco[m][n].forEach(p=>todas.push({...p}));
}
});
}
return todas;
}

/* embaralhar */
function embaralhar(p){
let arr=p.a.map((t,i)=>({t,correta:i===p.c}));
arr.sort(()=>Math.random()-0.5);
p.a=arr.map(o=>o.t);
p.c=arr.findIndex(o=>o.correta);
return p;
}

/* montar */
function montar(){
let div=document.getElementById("materias");
div.innerHTML="";
for(let m in banco){
let b=document.createElement("button");
b.innerText=m;
b.onclick=()=>nivel(m);
div.appendChild(b);
}
}

/* nível */
function nivel(m){
atual=m;
menu.classList.add("hidden");
nivelDiv.classList.remove("hidden");

let div=document.getElementById("niveis");
div.innerHTML="";

["facil","medio","dificil"].forEach(n=>{
let b=document.createElement("button");
b.innerText=n;
b.onclick=()=>start(n);
div.appendChild(b);
});
}

/* start */
function start(n){
prova=false;
nivelAtual=n;
perguntas=banco[atual][n].map(p=>embaralhar({...p}));
i=0;

nivelDiv.classList.add("hidden");
quiz.classList.remove("hidden");

mostrar();
}

/* prova */
function iniciarProva(){
prova=true;
perguntas=todasPerguntas().map(p=>embaralhar({...p}));
i=0;
xp=0;

document.getElementById("provaFinal").classList.add("hidden");
quiz.classList.remove("hidden");

mostrar();
}

/* mostrar */
function mostrar(){
if(i>=perguntas.length){fim();return;}

let p=perguntas[i];
pergunta.innerText=p.q;

let ops=document.getElementById("ops");
ops.innerHTML="";

p.a.forEach((txt,idx)=>{
let b=document.createElement("button");
b.className="option";
b.innerHTML=`<span class="letra">${String.fromCharCode(65+idx)}</span>${txt}`;
b.onclick=()=>responder(idx);
ops.appendChild(b);
});

xpTxt.innerText="XP: "+xp;
atualizarHUD();
}

/* responder */
function responder(x){
let opcoes=document.querySelectorAll(".option");

if(x===perguntas[i].c){
ok.play();
opcoes[x].classList.add("correct");
xp+=10;
}else{
no.play();
opcoes[x].classList.add("wrong");
opcoes[perguntas[i].c].classList.add("correct");
}

atualizarHUD();

setTimeout(()=>{
i++;
mostrar();
},600);
}

/* fim */
function fim(){
quiz.classList.add("hidden");

if(xp>=XP_MAX && !prova){
document.getElementById("provaFinal").classList.remove("hidden");
return;
}

final.classList.remove("hidden");
resultado.innerText=prova ? 
"🏆 VOCÊ COMPLETOU A PROVA FINAL!" :
"XP final: "+xp;

if(nivelAtual==="dificil"){
document.getElementById("btnProx").style.display="none";
}else{
document.getElementById("btnProx").style.display="block";
}

atualizarHUD();
}

/* repetir */
function repetir(){
start(nivelAtual);
final.classList.add("hidden");
}

/* próximo nível */
function proximoNivel(){
if(nivelAtual==="facil") start("medio");
else if(nivelAtual==="medio") start("dificil");
final.classList.add("hidden");
}

/* voltar */
function voltar(){
menu.classList.remove("hidden");
nivelDiv.classList.add("hidden");
quiz.classList.add("hidden");
final.classList.add("hidden");
atualizarHUD();
}

/* atalhos */
const menu=document.getElementById("menu");
const nivelDiv=document.getElementById("nivel");
const quiz=document.getElementById("quiz");
const final=document.getElementById("final");
const pergunta=document.getElementById("pergunta");
const xpTxt=document.getElementById("xp");
const resultado=document.getElementById("resultado");
const ok=document.getElementById("ok");
const no=document.getElementById("no");

/* iniciar */
montar();
atualizarHUD();

</script>

</html>
