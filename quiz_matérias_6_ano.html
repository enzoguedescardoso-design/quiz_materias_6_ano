// EMBARALHAR
function shuffle(p){
let arr=p.a.map((x,i)=>({x,ok:i===p.c}));
arr.sort(()=>Math.random()-0.5);
p.a=arr.map(e=>e.x);
p.c=arr.findIndex(e=>e.ok);
return p;
}

// montar menu
function montar(){
    let div = document.getElementById("materias");
    div.innerHTML = "";

    // pega o botão com segurança
    let btn = document.getElementById("btnVoltar");
    if(btn){
        btn.style.display = "none";
    }

    materias.forEach(m=>{
        let b = document.createElement("button");
        b.innerText = (nomes[idioma] && nomes[idioma][m]) ? nomes[idioma][m] : m;
        
        b.onclick = ()=>{
            atual = m;

            document.getElementById("menu").classList.add("hidden");
            document.getElementById("nivel").classList.remove("hidden");

            // mostra botão voltar com segurança
            let btn = document.getElementById("btnVoltar");
            if(btn){
                btn.style.display = "block";
            }

            mostrarNiveis();
        };

        div.appendChild(b);
    });
}

// níveis
function mostrarNiveis(){
let div=document.getElementById("niveis");
div.innerHTML="";

if(progresso[atual].facil){
let b=document.createElement("button");
b.innerText=t[idioma].facil;
b.onclick=()=>start("facil");
div.appendChild(b);
}

if(progresso[atual].medio){
let b=document.createElement("button");
b.innerText=t[idioma].medio;
b.onclick=()=>start("medio");
div.appendChild(b);
}

if(progresso[atual].dificil){
let b=document.createElement("button");
b.innerText=t[idioma].dificil;
b.onclick=()=>start("dificil");
div.appendChild(b);
}
}

// start
function start(n){

// REMOVE BOTÃO DE PRÓXIMO NÍVEL SE EXISTIR
let antigo = document.getElementById("btnProximoNivel");
if(antigo) antigo.remove();

perguntas=banco[atual][n].map(p=>shuffle({...p}));
i=0;
pontos=0;

document.getElementById("nivel").classList.add("hidden");
document.getElementById("final").classList.add("hidden"); // garante que suma
document.getElementById("quiz").classList.remove("hidden");
document.getElementById("btnVoltar").style.display = "block";

mostrar();
}

// mostrar pergunta
function mostrar(){
if(i>=perguntas.length){fim();return;}

let p=perguntas[i];
document.getElementById("pergunta").innerText=p.q[idioma];

let ops=document.getElementById("ops");
ops.innerHTML="";

["A","B","C","D"].forEach((l,idx)=>{
let b=document.createElement("button");
b.className="option";
b.innerHTML=`<span class="letra">${l}</span> ${p.a[idx]}`;
b.onclick=()=>responder(idx);
ops.appendChild(b);
});

document.getElementById("placar").innerText=t[idioma].pontos+": "+pontos;
}

// responder
function responder(x){
if(x===perguntas[i].c)pontos++;
i++;
mostrar();
}

// fim
function fim(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");

document.getElementById("textoFinal").innerText=t[idioma].pontos+": "+pontos;

// REMOVE botão antigo se existir
let antigo = document.getElementById("btnProximoNivel");
if(antigo) antigo.remove();

// CRIA BOTÃO NO CANTO
let botao = document.createElement("button");
botao.id = "btnProximoNivel";
botao.style.position = "fixed";
botao.style.bottom = "20px";
botao.style.right = "20px";
botao.style.width = "200px";
botao.style.zIndex = "1000";

if(progresso[atual].facil && !progresso[atual].medio){
progresso[atual].medio = true;

botao.innerText = "Ir para Médio";
botao.onclick = ()=>{
document.getElementById("final").classList.add("hidden");
start("medio");
};

document.body.appendChild(botao);

}else if(progresso[atual].medio && !progresso[atual].dificil){
progresso[atual].dificil = true;

botao.innerText = "Ir para Difícil";
botao.onclick = ()=>{
document.getElementById("final").classList.add("hidden");
start("dificil");
};

document.body.appendChild(botao);
}

// se já for difícil → não cria botão
}

// voltar
function voltar(){
    // Volta para o menu principal
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("nivel").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("final").classList.add("hidden");

    // ESCONDE o botão voltar no menu principal
    document.getElementById("btnVoltar").style.display = "none";

    // LIMPA botão de próximo nível (se existir)
    let prox = document.getElementById("proximoNivel");
    if(prox){
        prox.innerHTML = "";
    }

    // Reseta variáveis (evita bugs)
    atual = "";
    perguntas = [];
    i = 0;
    pontos = 0;
}


// idioma
function trocarIdioma(l){
idioma=l;
atualizar();
montar();
}

// atualizar textos
function atualizar(){
document.getElementById("titulo").innerText=t[idioma].titulo;
document.getElementById("nivelTitulo").innerText=t[idioma].nivel;
document.getElementById("btnVoltar").innerText=t[idioma].voltar;
document.getElementById("resultado").innerText=t[idioma].resultado;
}

// iniciar
montar();
atualizar();
